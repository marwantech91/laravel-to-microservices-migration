version: '3.8'

# The original monolith stack (before migration)

services:
  monolith:
    build:
      context: ./monolith
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DATABASE=monolith_app
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - TWILIO_SID=${TWILIO_SID}
      - TWILIO_TOKEN=${TWILIO_TOKEN}
    depends_on:
      - mongodb

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
